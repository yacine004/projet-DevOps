apiVersion: apps/v1
kind: Deployment
metadata:
  name: brasilburger-deployment
  namespace: production
  labels:
    app: brasilburger
    version: '1.0'
spec:
  replicas: 3
  selector:
    matchLabels:
      app: brasilburger
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: brasilburger
    spec:
      containers:
      - name: brasilburger
        image: yacine1108/brasilburger:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: '128Mi'
            cpu: '100m'
          limits:
            memory: '256Mi'
            cpu: '500m'
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
